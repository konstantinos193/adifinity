<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background matching your theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07141C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1F2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Orange gradient for landing pages -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Rocket icon for landing pages -->
  <path d="M 350 200 L 350 280 L 330 300 L 330 320 L 350 310 L 370 320 L 370 300 L 350 280 Z" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <path d="M 330 250 L 320 270 L 330 280" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <path d="M 370 250 L 380 270 L 370 280" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Chart/graph icon -->
  <rect x="800" y="200" width="80" height="60" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <rect x="810" y="240" width="15" height="15" fill="url(#neon)" opacity="0.8"/>
  <rect x="835" y="230" width="15" height="25" fill="url(#neon)" opacity="0.8"/>
  <rect x="860" y="220" width="15" height="35" fill="url(#neon)" opacity="0.8"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="60" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="150" r="40" fill="none" stroke="url(#neon)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    LANDING
  </text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    PAGES
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="28" fill="#F59E0B" text-anchor="middle" opacity="0.9">
    High-Converting Pages • Google Ads Ready
  </text>
  
  <!-- Tech stack -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#D97706" text-anchor="middle" opacity="0.8">
    Next.js • Mobile-First • Conversion Optimization
  </text>
  
  <!-- Logo -->
  <image href="/logo.png" x="520" y="550" width="160" height="60" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Corner decorations -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 0 L 1100 0 L 1200 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 0 630 L 100 630 L 0 530 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 630 L 1100 630 L 1200 530 Z" fill="url(#neon)" opacity="0.1"/>
</svg>
