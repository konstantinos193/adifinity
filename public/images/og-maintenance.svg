<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background matching your theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07141C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1F2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan gradient for maintenance -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Tools icon -->
  <path d="M 320 220 L 340 200 L 360 220 L 360 240 L 340 260 L 320 240 Z" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <path d="M 380 260 L 400 240 L 420 260 L 420 280 L 400 300 L 380 280 Z" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Shield/security icon -->
  <path d="M 800 200 L 850 200 L 850 250 L 825 280 L 800 250 Z" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <path d="M 815 220 L 815 240 M 825 220 L 825 240 M 835 220 L 835 240" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="60" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="150" r="40" fill="none" stroke="url(#neon)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    WEB
  </text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    MAINTENANCE
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="28" fill="#06B6D4" text-anchor="middle" opacity="0.9">
    Support & Updates • Security • Performance
  </text>
  
  <!-- Tech stack -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#0891B2" text-anchor="middle" opacity="0.8">
    Monitoring • Backups • Retainer Services
  </text>
  
  <!-- Logo -->
  <image href="/logo.png" x="520" y="550" width="160" height="60" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Corner decorations -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 0 L 1100 0 L 1200 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 0 630 L 100 630 L 0 530 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 630 L 1100 630 L 1200 530 Z" fill="url(#neon)" opacity="0.1"/>
</svg>
