<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background matching your theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07141C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1F2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Red gradient for web apps -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Code brackets decoration -->
  <path d="M 50 200 L 30 250 L 30 380 L 50 430" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 1150 200 L 1170 250 L 1170 380 L 1150 430" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  
  <!-- App window icon -->
  <rect x="320" y="200" width="120" height="80" rx="5" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <rect x="320" y="200" width="120" height="20" rx="5" fill="url(#neon)" opacity="0.8"/>
  <circle cx="335" cy="210" r="3" fill="white"/>
  <circle cx="345" cy="210" r="3" fill="white"/>
  <circle cx="355" cy="210" r="3" fill="white"/>
  
  <!-- Server/database icon -->
  <rect x="760" y="200" width="80" height="15" rx="3" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <rect x="760" y="220" width="80" height="15" rx="3" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <rect x="760" y="240" width="80" height="15" rx="3" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="775" cy="207" r="2" fill="url(#neon)"/>
  <circle cx="775" cy="227" r="2" fill="url(#neon)"/>
  <circle cx="775" cy="247" r="2" fill="url(#neon)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="60" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="150" r="40" fill="none" stroke="url(#neon)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    WEB
  </text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    APPLICATIONS
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="28" fill="#EF4444" text-anchor="middle" opacity="0.9">
    Custom Apps • SaaS Platforms • Dashboards
  </text>
  
  <!-- Tech stack -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#DC2626" text-anchor="middle" opacity="0.8">
    React • Node.js • Full-Stack • APIs
  </text>
  
  <!-- Logo -->
  <image href="/logo.png" x="520" y="550" width="160" height="60" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Corner decorations -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 0 L 1100 0 L 1200 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 0 630 L 100 630 L 0 530 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 630 L 1100 630 L 1200 530 Z" fill="url(#neon)" opacity="0.1"/>
</svg>
