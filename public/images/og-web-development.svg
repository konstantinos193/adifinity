<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background matching your theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07141C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1F2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Neon cyan gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01A9FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern for tech feel -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#01FFFF" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1100" cy="530" r="60" fill="none" stroke="url(#neon)" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Code brackets decoration -->
  <path d="M 50 200 L 30 250 L 30 380 L 50 430" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 1150 200 L 1170 250 L 1170 380 L 1150 430" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    WEBSITE
  </text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    DEVELOPMENT
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="28" fill="#01FFFF" text-anchor="middle" opacity="0.9">
    Custom Solutions • No Templates
  </text>
  
  <!-- Tech stack -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#01A9FF" text-anchor="middle" opacity="0.8">
    React • Next.js • Full-Stack • SEO
  </text>
  
  <!-- Bottom branding -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">
    adinfinity.gr
  </text>
  
  <!-- Corner decorations -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 0 L 1100 0 L 1200 100 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 0 630 L 100 630 L 0 530 Z" fill="url(#neon)" opacity="0.1"/>
  <path d="M 1200 630 L 1100 630 L 1200 530 Z" fill="url(#neon)" opacity="0.1"/>
</svg>
